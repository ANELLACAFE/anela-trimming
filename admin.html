<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面 — ANELLA CAFE トリミング予約</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ══════════════════════════════════
     ログイン画面
══════════════════════════════════ -->
<div id="login-section">
    <div id="login-container">
        <p class="login-logo">ANELLA CAFE</p>
        <p class="login-subtitle">スタッフ管理画面</p>
        <input type="password" id="login-password" placeholder="パスワードを入力">
        <button id="login-btn">ログイン</button>
        <p class="login-error" id="login-error">パスワードが正しくありません。</p>
    </div>
</div>

<!-- ══════════════════════════════════
     管理画面
══════════════════════════════════ -->
<div id="admin-section" style="display:none;">

    <header>
        <p class="header-eyebrow">Staff Dashboard</p>
        <h1>ANELLA CAFE</h1>
        <p class="header-subtitle">南浦和店 — トリミング予約・カルテ管理</p>
    </header>

    <div class="admin-layout">

        <div class="admin-topbar">
            <h1>予約一覧</h1>
            <button class="btn btn-primary" id="refresh-btn">🔄 最新情報に更新</button>
        </div>

        <!-- ── フィルターバー ── -->
        <div class="admin-toolbar">
            <label for="filter-date">日付で絞り込み</label>
            <input type="date" id="filter-date">
            <button class="btn btn-ghost btn-sm" id="filter-today-btn">📅 今日</button>
            <button class="btn btn-ghost btn-sm" id="filter-clear-btn">✕ 絞り込み解除</button>
            <div class="toolbar-divider"></div>
            <label for="filter-keyword">名前・犬種で検索</label>
            <input type="text" id="filter-keyword" placeholder="例：うに、プードル" style="min-width:160px">
        </div>

        <!-- ── 予約テーブル ── -->
        <div class="table-wrap">
            <table class="reservation-table">
                <thead>
                    <tr>
                        <th>予約日</th>
                        <th>時間枠</th>
                        <th>飼い主名</th>
                        <th>わんちゃん名</th>
                        <th>犬種</th>
                        <th>カルテ</th>
                        <th>削除</th>
                    </tr>
                </thead>
                <tbody id="reservation-list">
                    <tr><td colspan="7" class="empty-state"><span class="empty-icon">🐾</span>読み込み中...</td></tr>
                </tbody>
            </table>
        </div>

        <p id="result-count" style="text-align:right; font-size:0.82rem; color:#aaa; margin-top:10px;"></p>

    </div>
</div>

<!-- ══════════════════════════════════
     カルテ詳細モーダル
══════════════════════════════════ -->
<div id="detail-modal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-content">
        <div class="modal-header">
            <h2>顧客カルテ詳細</h2>
            <button class="close-btn" id="modal-close" aria-label="閉じる">×</button>
        </div>
        <div class="detail-grid" id="modal-detail-content"></div>
    </div>
</div>

<!-- ══════════════════════════════════
     削除確認ダイアログ
══════════════════════════════════ -->
<div id="confirm-dialog" class="confirm-dialog" role="alertdialog" aria-modal="true">
    <div class="confirm-box">
        <p id="confirm-message">この予約を削除しますか？</p>
        <div class="confirm-actions">
            <button class="btn btn-ghost" id="confirm-cancel-btn">キャンセル</button>
            <button class="btn btn-danger" id="confirm-ok-btn">削除する</button>
        </div>
    </div>
</div>

<!-- トースト通知 -->
<div id="toast"></div>

<script>
// ── Supabase 初期化 ──
const SUPABASE_URL  = "https://omphuvdamamlseifccfq.supabase.co";
const SUPABASE_KEY  = "sb_publishable_nTsYxNVL2N4P3WjSUtSTgw_E1aaCb4d";
const _supabase     = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const ADMIN_PASSWORD = "anela";

// ── ユーティリティ ──
function showToast(message, type = "success") {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.className = "show " + type;
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => { toast.className = ""; }, 3500);
}

function formatTime(timeStr) {
    const hh = (timeStr || "").substring(0, 5);
    if (hh === "11:00") return { label: "11:00〜14:00", cls: "am" };
    if (hh === "15:00") return { label: "15:00〜18:00", cls: "pm" };
    return { label: hh, cls: "" };
}

function val(v) {
    return (v && v.trim()) ? v : '<span class="detail-value empty">未入力</span>';
}

// ── ログイン ──
function handleLogin() {
    const pw = document.getElementById("login-password").value;
    const errEl = document.getElementById("login-error");
    if (pw === ADMIN_PASSWORD) {
        document.getElementById("login-section").style.display = "none";
        document.getElementById("admin-section").style.display = "block";
        loadReservations();
    } else {
        errEl.classList.add("visible");
        document.getElementById("login-password").classList.add("is-invalid");
    }
}
document.getElementById("login-btn").addEventListener("click", handleLogin);
document.getElementById("login-password").addEventListener("keypress", e => {
    if (e.key === "Enter") handleLogin();
});

// ── データ管理 ──
let allReservations = [];

async function loadReservations() {
    const tbody = document.getElementById("reservation-list");
    tbody.innerHTML = `<tr><td colspan="7" class="empty-state"><span class="empty-icon">🐾</span>読み込み中...</td></tr>`;

    try {
        const { data, error } = await _supabase
            .from("reservations")
            .select("*")
            .order("reservation_date", { ascending: false })
            .order("reservation_time", { ascending: true });

        if (error) throw error;
        allReservations = data;
        renderTable();
    } catch (err) {
        console.error(err);
        tbody.innerHTML = `<tr><td colspan="7" class="empty-state"><span class="empty-icon">⚠️</span>データの取得に失敗しました。</td></tr>`;
        showToast("データの取得に失敗しました。", "error");
    }
}

function renderTable() {
    const tbody      = document.getElementById("reservation-list");
    const filterDate = document.getElementById("filter-date").value;
    const filterKw   = document.getElementById("filter-keyword").value.trim().toLowerCase();
    const countEl    = document.getElementById("result-count");

    let filtered = allReservations;

    if (filterDate) {
        filtered = filtered.filter(r => r.reservation_date === filterDate);
    }
    if (filterKw) {
        filtered = filtered.filter(r =>
            (r.owner_name || "").toLowerCase().includes(filterKw) ||
            (r.dog_name   || "").toLowerCase().includes(filterKw) ||
            (r.breed      || "").toLowerCase().includes(filterKw)
        );
    }

    countEl.textContent = filtered.length > 0 ? `${filtered.length} 件を表示中` : "";

    if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty-state"><span class="empty-icon">🔍</span>該当する予約がありません。</td></tr>`;
        return;
    }

    tbody.innerHTML = "";
    filtered.forEach(res => {
        const { label, cls } = formatTime(res.reservation_time);
        const originalIndex = allReservations.indexOf(res);
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td><strong>${res.reservation_date}</strong></td>
            <td><span class="time-badge ${cls}">${label}</span></td>
            <td>${res.owner_name || "—"}</td>
            <td><strong>${res.dog_name || "—"}</strong></td>
            <td>${res.breed || "—"}</td>
            <td>
                <button class="btn btn-info btn-sm" onclick="showDetail(${originalIndex})">
                    📋 カルテ表示
                </button>
            </td>
            <td>
                <button class="btn btn-danger btn-sm" onclick="confirmDelete(${originalIndex})">
                    🗑 削除
                </button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

// ── フィルター操作 ──
document.getElementById("filter-date").addEventListener("change", renderTable);
document.getElementById("filter-keyword").addEventListener("input", renderTable);
document.getElementById("refresh-btn").addEventListener("click", loadReservations);

document.getElementById("filter-today-btn").addEventListener("click", () => {
    document.getElementById("filter-date").value = new Date().toISOString().split("T")[0];
    renderTable();
});
document.getElementById("filter-clear-btn").addEventListener("click", () => {
    document.getElementById("filter-date").value = "";
    document.getElementById("filter-keyword").value = "";
    renderTable();
});

// ── カルテ詳細モーダル ──
window.showDetail = function(index) {
    const res = allReservations[index];
    const { label } = formatTime(res.reservation_time);
    const content = document.getElementById("modal-detail-content");

    const items = [
        { label: "予約日",        value: res.reservation_date, full: false },
        { label: "予約時間枠",    value: label, full: false },
        { label: "飼い主氏名",    value: res.owner_name, full: false },
        { label: "フリガナ",      value: res.owner_kana, full: false },
        { label: "電話番号",      value: res.phone, full: false },
        { label: "緊急連絡先",    value: res.emergency_phone, full: false },
        { label: "住所",          value: res.address, full: true },
        { label: "当店を知ったきっかけ", value: res.trigger_text, full: true },
        { label: "わんちゃん名",  value: res.dog_name, full: false },
        { label: "犬種",          value: res.breed, full: false },
        { label: "生年月日・年齢",value: res.dog_birthday, full: false },
        { label: "性別",          value: res.gender, full: false },
        { label: "かかりつけ病院",value: res.regular_hospital, full: false },
        { label: "避妊・去勢手術",value: res.spay_neuter, full: false },
        { label: "アレルギー",    value: res.allergies, full: true },
        { label: "好きなところ",  value: res.favorite_spots, full: true },
        { label: "苦手なところ",  value: res.dislike_spots, full: true },
        { label: "持病・治療中",  value: res.medical_history, full: true },
        { label: "狂犬病予防注射済票", value: res.rabies_vaccine, full: false },
        { label: "済票画像ファイル",   value: res.rabies_image, full: false },
        { label: "混合ワクチン",       value: res.mixed_vaccine, full: false },
        { label: "証明書画像ファイル", value: res.mixed_vaccine_image, full: false },
        { label: "ノミ・ダニ予防",     value: res.flea_tick_prevent, full: false },
        { label: "ノミ・ダニ画像",     value: res.flea_tick_image, full: false },
        { label: "フィラリア予防",     value: res.heartworm_prevent, full: false },
        { label: "フィラリア画像",     value: res.heartworm_image, full: false },
    ];

    content.innerHTML = items.map(item => `
        <div class="detail-item${item.full ? " full-width" : ""}">
            <div class="detail-label">${item.label}</div>
            <div class="detail-value">${val(item.value)}</div>
        </div>
    `).join("");

    document.getElementById("detail-modal").classList.add("open");
};

document.getElementById("modal-close").addEventListener("click", () => {
    document.getElementById("detail-modal").classList.remove("open");
});
document.getElementById("detail-modal").addEventListener("click", e => {
    if (e.target === document.getElementById("detail-modal")) {
        document.getElementById("detail-modal").classList.remove("open");
    }
});

// ── 削除 ──
let pendingDeleteIndex = null;

window.confirmDelete = function(index) {
    const res = allReservations[index];
    pendingDeleteIndex = index;
    document.getElementById("confirm-message").innerHTML =
        `<span class="confirm-name">${res.dog_name}（${res.owner_name}様）</span><br>${res.reservation_date} の予約を削除しますか？<br><small style="color:#e74c3c">この操作は元に戻せません。</small>`;
    document.getElementById("confirm-dialog").classList.add("open");
};

document.getElementById("confirm-cancel-btn").addEventListener("click", () => {
    pendingDeleteIndex = null;
    document.getElementById("confirm-dialog").classList.remove("open");
});

document.getElementById("confirm-ok-btn").addEventListener("click", async () => {
    if (pendingDeleteIndex === null) return;
    const res = allReservations[pendingDeleteIndex];
    document.getElementById("confirm-dialog").classList.remove("open");

    try {
        const { error } = await _supabase
            .from("reservations")
            .delete()
            .eq("id", res.id);

        if (error) throw error;
        showToast(`${res.dog_name}（${res.owner_name}様）の予約を削除しました。`, "success");
        allReservations.splice(pendingDeleteIndex, 1);
        pendingDeleteIndex = null;
        renderTable();
    } catch (err) {
        console.error(err);
        showToast("削除に失敗しました。", "error");
        pendingDeleteIndex = null;
    }
});

// ESCキーでモーダル・ダイアログを閉じる
document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
        document.getElementById("detail-modal").classList.remove("open");
        document.getElementById("confirm-dialog").classList.remove("open");
        pendingDeleteIndex = null;
    }
});
</script>
</body>
</html>
